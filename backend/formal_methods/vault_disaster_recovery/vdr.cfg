CONSTANTS
  NULL = NULL
  LATEST_VERSION = LATEST_VERSION
  VdrConfig1 = VdrConfig1
  \* To make model checking faster, scale down to one DI and/or Vault.
  DataIdentifiers = {DataIdentifier1, DataIdentifier2}
  Vaults = {Vault1, Vault2}

CONSTANTS
  BlobBatchSize = 3
  ManifestBatchSize = 3
  MaxNumRequests = 4


\* FairSpec is slower but more complete since it checks invariants and properties for traces that do not terminate.
\* SPECIFICATION FairSpec
SPECIFICATION TerminatesSpec

INVARIANT
  TypeInvariant
  VaultVersionCorrectness
  WorkerNotAheadOfApi
  NoDuplicateIds
  NoDuplicateVaultVersionSeqnos
  VaultVersionsAreMonotonicNaturals
  VaultApiRequestsAccountedCorrectly
  S3ManifestKeyFunctionIsInjective
  S3LatestManifestKeyFunctionIsInjective

  BatchTypeInvariant
  VaultApiFinishesGeneration
  AtTermAllBlobsAreWritten
  AtTermAllVaultVersionsWritten
  AtTermOneVersionedManifestPerVaultVersion
  AtTermOneLatestKeyPerVaultWithWrites
  LatestS3ManifestNotWrittenWithoutVersionedManifest
  AtTermLatestS3ManifestVersionIsGreatestVersionForEachVault
  S3VersionedManifestVersionsAreNotSkippedBeforeLatestManifestsWritten


PROPERTIES
  Termination
  DlBatchUpdatesCorrect

CHECK_DEADLOCK TRUE
