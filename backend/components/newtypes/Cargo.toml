[package]
name = "newtypes"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
derive_more = "0.99.17"
paperclip = { version = "0.7.1", features = ["actix4"] }
serde_json = "1.0"
thiserror = {version = "1.0"}
chrono = {version = "0.4",  features = ["serde"] }
strum_macros = { version = "0.24" }
strum = { version = "0.24", features = ["derive"] }
serde_derive = { version = "1.0"}
base64 = "0.13"
regex = "1.5"
async-trait = "0.1"
crypto = { path = "../enclave/crypto" }
lazy_static = "1.0"
uuid = { version = "1.1.2", features = ["serde", "v4"] }
schemars = { version = "0.8", features = ["chrono", "uuid1", "preserve_order"]}

# diesel
diesel-derive-newtype = "2.0.0-rc.0"
diesel = { version = "2.0.0", features = ["postgres", "extras"] }
diesel-derive-enum = {  rev = "e6aa69856245f083645a0087527236a6bff42c18", git="https://github.com/adwhit/diesel-derive-enum",  features = ["postgres"] }
diesel_as_jsonb = "1.0.0"

[dev-dependencies]
test-case = "2.1.0"