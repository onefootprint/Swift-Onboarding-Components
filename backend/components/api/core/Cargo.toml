    "extras",
    "uuid",
    "postgres",
    "i-implement-a-third-party-backend-and-opt-into-breaking-changes",
] }
diesel_migrations = { workspace = true }
db_schema = { path = "../../db/schema" }

[[bench]]
name = "api_error"
path = "benches/api_error.rs"
harness = false
