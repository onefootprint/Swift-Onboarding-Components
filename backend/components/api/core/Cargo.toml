diesel = { workspace = true }
openai = { workspace = true }

[dev-dependencies]
test-case = { workspace = true }
enclave = { path = "../../enclave/enclave" }
macros = { path = "../../macros" }
portpicker = "0.1.1"

tokio-test = "0.4.2"
