[package]
name = "rpc"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"]}
serde_cbor = "0.11"
byteorder = "1.4"
uuid = { version = "1.1.2", features = ["v4", "serde"] }
thiserror = "1.0"
crypto = { path = "../crypto" }
log = "0.4"
