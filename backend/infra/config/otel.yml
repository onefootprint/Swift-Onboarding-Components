extensions:
  health_check:

receivers:
  statsd:
    endpoint: 0.0.0.0:8125
    aggregation_interval: 60s
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:55681

  awsecscontainermetrics:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'prometheus-metrics'
          scrape_interval: 60s
          metrics_path: '/${API_SERVER_METRICS_ENDPOINT_PATH}'
          static_configs:
            - targets: ['${API_SERVER_TARGET}']

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 33
    spike_limit_percentage: 20

  batch/honeycomb:

  batch/traces:

  batch/metrics:
    timeout: 30s

  filter:
    metrics:
      include:
        match_type: strict
        metric_names:
          - ecs.task.memory.reserved
          - ecs.task.memory.utilized
          - ecs.task.cpu.reserved
          - ecs.task.cpu.utilized
          - ecs.task.network.rate.rx
          - ecs.task.network.rate.tx
          - ecs.task.storage.read_bytes
          - ecs.task.storage.write_bytes
          - container.duration

exporters:
  logging:
    loglevel: debug

  otlphttp:
    endpoint: 'https://collect.observeinc.com/v1/otel'
    headers:
      'Authorization': 'Bearer 189225732777 ds1BDO1OhDoXvlDOv6aY:9o_nM2E4K83AJuNMWkIKoRaEBlOaWFZr'

  otlp/honeycomb:
    endpoint: 'api.honeycomb.io:443'
    headers:
      'x-honeycomb-team': '${HONEYCOMB_API_KEY}'
      'x-honeycomb-dataset': 'fpc-otel'

  otlp/honeycombprom:
    endpoint: 'api.honeycomb.io:443'
    headers:
      'x-honeycomb-team': '${HONEYCOMB_API_KEY}'
      'x-honeycomb-dataset': 'fpc-prometheus'

  otlp/honeycombaws:
    endpoint: 'api.honeycomb.io:443'
    headers:
      'x-honeycomb-team': '${HONEYCOMB_API_KEY}'
      'x-honeycomb-dataset': 'fpc-aws-otel'

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch/traces]
      exporters: [otlphttp]
    metrics/application:
      receivers: [otlp, prometheus]
      processors: [memory_limiter]
      exporters: [otlp/honeycombprom]
    metrics/performance:
      receivers: [awsecscontainermetrics]
      processors: [memory_limiter, filter]
      exporters: [otlp/honeycombaws]
    traces/honeycomb:
      receivers: [otlp]
      processors: [memory_limiter, batch/honeycomb]
      exporters: [logging, otlp/honeycomb]
    logs/honeycomb:
      receivers: [otlp]
      processors: [memory_limiter, batch/honeycomb]
      exporters: [logging, otlp/honeycomb]
    metrics/honeycomb:
      receivers: [otlp]
      processors: [memory_limiter, batch/honeycomb]
      exporters: [logging, otlp/honeycomb]

  extensions: [health_check]
