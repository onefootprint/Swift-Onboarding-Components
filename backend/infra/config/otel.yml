extensions:
  health_check:

receivers:
  statsd:
    endpoint: 0.0.0.0:8125
    aggregation_interval: 60s
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:55681

  awsecscontainermetrics:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'prometheus-metrics'
          scrape_interval: 60s
          metrics_path: '/${API_SERVER_METRICS_ENDPOINT_PATH}'
          static_configs:
            - targets: ['${API_SERVER_TARGET}']

processors:
  batch/honeycomb:

  batch/traces:
    timeout: 1s
    send_batch_size: 50

  batch/metrics:
    timeout: 30s

  filter:
    metrics:
      include:
        match_type: strict
        metric_names:
          - ecs.task.memory.reserved
          - ecs.task.memory.utilized
          - ecs.task.cpu.reserved
          - ecs.task.cpu.utilized
          - ecs.task.network.rate.rx
          - ecs.task.network.rate.tx
          - ecs.task.storage.read_bytes
          - ecs.task.storage.write_bytes
          - container.duration

exporters:
  logging:
    loglevel: debug

  otlp/elastic:
    # Elastic APM server https endpoint without the "https://" prefix
    endpoint: '${ELASTIC_APM_SERVER_ENDPOINT}'
    headers:
      # Elastic APM ApiKey
      Authorization: 'ApiKey ${ELASTIC_APM_API_KEY}'

  otlphttp:
    endpoint: 'https://collect.observeinc.com/v1/otel'
    headers:
      'Authorization': 'Bearer 189225732777 ds1BDO1OhDoXvlDOv6aY:9o_nM2E4K83AJuNMWkIKoRaEBlOaWFZr'

  prometheusremotewrite:
    endpoint: 'https://prometheus-prod-10-prod-us-central-0.grafana.net/api/prom/push'
    headers:
      'Authorization': 'Basic ${GRAFANA_PROMETHEUS_PUSH_AUTH}'

  prometheusremotewrite/observe:
    endpoint: 'https://collect.observeinc.com/v1/prometheus'
    headers:
      'Authorization': 'Bearer 189225732777 ds17JEl56KdqAO6MYQaJ:HxEdwLlbfEp2NBQCnVJBEpA-BI8wh1VU'
  
  otlp/honeycomb:
    endpoint: "api.honeycomb.io:443"
    headers:
      "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
      "x-honeycomb-dataset": "fpc-otel"

  otlp/honeycombprom:
    endpoint: "api.honeycomb.io:443"
    headers:
      "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
      "x-honeycomb-dataset": "fpc-prometheus"

  otlp/honeycombaws:
    endpoint: "api.honeycomb.io:443"
    headers:
      "x-honeycomb-team": "${HONEYCOMB_API_KEY}"
      "x-honeycomb-dataset": "fpc-aws-otel"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch/traces]
      exporters: [logging, otlp/elastic, otlphttp]
    metrics/application:
      receivers: [otlp, prometheus]
      processors: []
      exporters:
        [
          logging,
          prometheusremotewrite,
          prometheusremotewrite/observe,
          otlp/elastic,
          otlp/honeycombprom,
        ]
    metrics/performance:
      receivers: [awsecscontainermetrics]
      processors: [filter]
      exporters:
        [
          logging,
          prometheusremotewrite,
          prometheusremotewrite/observe,
          otlp/elastic,
          otlp/honeycombaws,
        ]
    traces/honeycomb:
      receivers: [otlp]
      processors: [batch/honeycomb]
      exporters: [otlp/honeycomb]
    logs/honeycomb:
      receivers: [otlp]
      processors: [batch/honeycomb]
      exporters: [otlp/honeycomb]
    metrics/honeycomb:
      receivers: [otlp]
      processors: [batch/honeycomb]
      exporters: [otlp/honeycomb]


  extensions: [health_check]
