app = "hooky"

kill_signal = "SIGINT"
kill_timeout = 5

[experimental]
cmd = "./hooky"

[env]
  PORT = 5003
  RUST_LOG = "info"

[[services]]
  internal_port = 5003
  protocol = "tcp"

[services.concurrency]
  hard_limit = 25
  soft_limit = 20
  type = "connections"

[[services.ports]]
  handlers = ["tls", "http"]
  port = "443"

[[services.http_checks]]
  interval = 10000
  method = "get"
  path = "/health_check"
  protocol = "http"
  timeout = 2000
