rules:
  - id: create-index
    languages:
      - generic
    message: Use CREATE INDEX CONCURRENTLY to avoid taking an ACCESS EXCLUSIVE lock on the table.
    severity: WARNING
    patterns:
      - pattern-regex: (?i)CREATE\s+INDEX(?!\s+CONCURRENTLY)
    paths:
      include:
        - "*.sql"
      exclude:
        - "down.sql"

