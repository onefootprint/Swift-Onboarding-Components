rules:
  - id: session-token
    languages:
      - generic
    message: Do not commit secrets to version control. Please ensure these tokens are expired or rotated. If this is a verified fake token used in public documentation, you can add it to the exception list in https://github.com/onefootprint/monorepo/blob/master/semgrep/footprint-secrets/session-token.yaml.
    severity: ERROR
    patterns:
      - pattern-regex: "([a-z]+tok_[A-Za-z0-9]{16,})"
      - metavariable-pattern:
          metavariable: $1
          language: generic
          patterns:
            # Fake/invalid tokens used for public documentation.
            - pattern-not: cttok_UxM6Vbvk2Rcy1gzcSuXgk3sj3L9I0pAnNH
            - pattern-not: vtok_udLaWUxPBo3fss603v8kY8k9ssjboxfwI
