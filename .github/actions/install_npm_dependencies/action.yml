name: 'Install npm dependencies'
description: 'This action installs and caches node modules packages'
inputs:
  node-version:
    description: 'NodeJS version'
    required: false
    default: ${{ matrix.node-version }}
outputs:
  cache-hit:
    description: The output of cache-dependencies step
    value: ${{ steps.cache-dependencies.outputs.cache-hit }}
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # ratchet:actions/checkout@v4

    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7 # ratchet:actions/setup-node@v3
      with:
        node-version: ${{ inputs.node-version }}

    - name: Cache management for "frontend/node_modules"
      uses: actions/cache@e12d46a63a90f2fae62d114769bbf2a179198b5c # ratchet:actions/cache@v3
      id: cache-dependencies
      with:
        key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
        path: frontend/node_modules
        restore-keys: |
          ${{ runner.os }}-yarn-
    - name: Install "frontend/node_modules" if not cached
      working-directory: ./frontend
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      shell: bash
      run: yarn install --frozen-lockfile
