name: Backend Destroy Ephemeral Stack
on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      branchName:
        description: "Name of the branch whose stack to delete. DEV ONLY"
        required: true
        type: string

jobs:
  destroy_ephemeral_stack:
    name: Destroy Ephemeral Stack
    runs-on: ubuntu-latest
    environment: dev
    # don't run for dependabot changes and PRs that don't label ephemeral
    if: github.actor != 'dependabot[bot]' && ((github.event_name != 'pull_request') || (github.event_name == 'pull_request' && contains( github.event.pull_request.labels.*.name, 'ephemeral')))

    steps:
      - uses: actions/checkout@v2

      # pulumi setup
      - uses: actions/setup-node@v2
        with:
          node-version: 14.x
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Pulumi CLI
        uses: pulumi/setup-pulumi@v2.0.0
        with:
          pulumi-version: 3.39.1

      - run: npm install
        working-directory: ./backend/infra

      - name: Extract stack name
        shell: bash
        run: |
          branch_raw="${{ github.event.inputs.branchName || github.head_ref }}"
          branch="$(echo ${branch_raw} | sed -r 's/\//-/g' | sed -r 's/_/-/g')"
          stack="dev-${branch}"
          echo "##[set-output name=stack;]$(echo ${stack})"
        id: get_stack_name

      # create our temp stack
      - run: pulumi stack init --secrets-provider ${{ secrets.AWS_SECRETS_PROVIDER }} --copy-config-from "footprint/dev" "footprint/${{ steps.get_stack_name.outputs.stack }}" || true
        working-directory: ./backend/infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      # copy our stack file just in case
      - run: cp Pulumi.dev.yaml Pulumi.${{ steps.get_stack_name.outputs.stack }}.yaml
        working-directory: ./backend/infra

      # get the url for the environment
      - name: Extract env url
        shell: bash
        working-directory: ./backend/infra
        run: |
          base=$(pulumi config --stack footprint/${{ steps.get_stack_name.outputs.stack }} get --path constants.domain.base)
          url="${{ steps.get_stack_name.outputs.stack }}.${base}"
          echo "##[set-output name=url;]$(echo ${url})"
        id: extract_env_url

      # bring up the ephemeral stack
      - uses: pulumi/actions@v3
        with:
          command: destroy
          work-dir: ./backend/infra
          stack-name: "footprint/${{ steps.get_stack_name.outputs.stack }}"
          message: "Destroyed ephemeral environment https://${{ steps.extract_env_url.outputs.url }}"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      # rm our temp stack
      - run: pulumi stack --stack footprint/${{ steps.get_stack_name.outputs.stack }} rm -y
        working-directory: ./backend/infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
