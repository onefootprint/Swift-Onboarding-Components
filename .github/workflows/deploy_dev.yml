name: Build Components

on:
  push:
    paths:
      - "infra/**"
      - "components/**"
      - "*.dockerfile"
      - ".github/workflows/create_ephemeral_stack.yml"
      - ".github/workflows/build_and_deploy.yml"
      - ".github/workflows/deploy_dev.yml"

    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-deploy-dev
  cancel-in-progress: true

jobs:
  deploy_stack_dev:
    name: Deploy stack dev
    uses: ./.github/workflows/build_and_deploy.yml
    with:
      environment: dev
      baseStackName: dev
      stackName: dev
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ENCLAVE_SIGNING_KEY: ${{ secrets.ENCLAVE_SIGNING_KEY }}
      ENCLAVE_SIGNING_CERT: ${{ secrets.ENCLAVE_SIGNING_CERT }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      AWS_SECRETS_PROVIDER: ${{ secrets.AWS_SECRETS_PROVIDER }}

  sentry_release:
    name: "Sentry Release Integration"
    runs-on: ubuntu-latest
    needs: [deploy_stack_dev]
    environment: dev
    steps:
      - uses: actions/checkout@v2
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: onefootprint
          SENTRY_PROJECT: backend
        with:
          environment: dev

  run_integration_tests:
    name: Run dev integration tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9"]
    environment: dev
    env:
      TEST_URL: "${{ needs.deploy_stack_dev.outputs.url }}"
    needs: [deploy_stack_dev]
    if: success()
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python # Set Python version
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        working-directory: ci
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Set dot env
        run: make set-dot-env
        # sleep for 30s to make sure we've deployed new containers before running integration tests
        # TODO: get actual status from amazon?
      - name: Sleep for 30s
        run: sleep 30
      - name: Integration testing
        working-directory: ci
        run: pytest tests/ --emoji --md report.md --html report.html --self-contained-html
      - name: Upload pytest test results
        uses: actions/upload-artifact@v3
        with:
          name: integ-tests-results-${{ matrix.python-version }}
          path: ci/report.html
        # Use always() to always run this step to publish test results when there are test failures
        if: ${{ always() }}
