name: Build Components

on:
  push:
    paths:
      - 'infra/**'
      - 'components/**'
      - '.github/workflows/**'

    branches:
      - master

jobs:  
  deploy_stack:    
    name: Deploy stack
    runs-on: ubuntu-latest
    environment: dev
    if: github.actor != 'dependabot[bot]' # don't run for dependabot changes
    steps:
      - uses: actions/checkout@v2
      - uses: ./.github/workflows/build_and_deploy.yml
        with:
          environment: dev
          stackName: "${{secrets.STACK_NAME}}"


