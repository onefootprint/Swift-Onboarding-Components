name: Build Components

on:
  push:
    paths:
      - 'infra/**'
      - 'components/**'
      - '.github/workflows/**'

    branches:
      - master

jobs:  
  deploy_stack_dev:    
    name: Deploy stack dev
    uses: ./.github/workflows/build_and_deploy.yml
    with:
      environment: dev
      stackName: dev


