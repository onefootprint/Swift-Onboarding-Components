name: Build Components

on:
  push:
    paths:
      - 'infra/**'
      - 'components/**'
      - '.github/workflows/**'

    branches:
      - master

jobs:  
  deploy_stack:    
    name: Deploy stack
    uses: ./.github/workflows/build_and_deploy.yml
    with:
      environment: dev
      stackName: "${{secrets.STACK_NAME}}"


