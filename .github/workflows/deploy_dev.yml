name: Deploy Dev

on:
  push:
    paths:
      - "infra/**"
      - "components/**"
      - "*.dockerfile"
      - ".github/workflows/build_and_deploy.yml"
      - ".github/workflows/deploy_dev.yml"

    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-deploy-dev
  cancel-in-progress: true

jobs:
  deploy_stack_dev:
    name: Deploy stack dev
    uses: ./.github/workflows/build_and_deploy.yml
    with:
      environment: dev
      baseStackName: dev
      stackName: dev
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ENCLAVE_SIGNING_KEY: ${{ secrets.ENCLAVE_SIGNING_KEY }}
      ENCLAVE_SIGNING_CERT: ${{ secrets.ENCLAVE_SIGNING_CERT }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      AWS_SECRETS_PROVIDER: ${{ secrets.AWS_SECRETS_PROVIDER }}

  sentry_release:
    name: "Sentry Release Integration"
    runs-on: ubuntu-latest
    needs: [deploy_stack_dev]
    environment: dev
    steps:
      - uses: actions/checkout@v2
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: onefootprint
          SENTRY_PROJECT: backend
        with:
          environment: dev

  run_tests:
    name: "integration tests"
    needs: [deploy_stack_dev]
    if: success()
    uses: ./.github/workflows/remote_integration_tests.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      testUrl: "${{ needs.deploy_stack_dev.outputs.url }}"
      isPR: false
    secrets:
      INTEGRATION_TEST_PHONE_NUMBER: ${{ secrets.INTEGRATION_TEST_PHONE_NUMBER }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_API_KEY: ${{ secrets.TWILIO_API_KEY }}
      TWILIO_API_KEY_SECRET: ${{ secrets.TWILIO_API_KEY_SECRET }}
    
  #
  # NOTE: for now we are auto-deploying to prod if tests pass!
  # 
  deploy_stack_prod:
    name: "[Prod] Deploy stack"
    needs: [run_tests]
    uses: ./.github/workflows/build_and_deploy.yml
    with:
      environment: production
      baseStackName: prod
      stackName: prod
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ENCLAVE_SIGNING_KEY: ${{ secrets.ENCLAVE_SIGNING_KEY }}
      ENCLAVE_SIGNING_CERT: ${{ secrets.ENCLAVE_SIGNING_CERT }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      AWS_SECRETS_PROVIDER: ${{ secrets.AWS_SECRETS_PROVIDER }}

  sentry_release_prod:
    name: "[Prod] Sentry Release Integration"
    runs-on: ubuntu-latest
    needs: [deploy_stack_prod]
    environment: production
    steps:
      - uses: actions/checkout@v2
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: onefootprint
          SENTRY_PROJECT: backend
        with:
          environment: production

  run_tests_prod:
    name: "[prod] integration tests"
    needs: [deploy_stack_prod]
    if: success()
    uses: ./.github/workflows/remote_integration_tests.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      testUrl: "${{ needs.deploy_stack_prod.outputs.url }}"
      isPR: false
    secrets:
      INTEGRATION_TEST_PHONE_NUMBER: ${{ secrets.INTEGRATION_TEST_PHONE_NUMBER }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_API_KEY: ${{ secrets.TWILIO_API_KEY }}
      TWILIO_API_KEY_SECRET: ${{ secrets.TWILIO_API_KEY_SECRET }}      
