name: Frontend E2E Auth Chromium

on:
  pull_request:
    paths:
      - 'frontend/apps/auth/**'
      - 'frontend/apps/demos/**'
      - 'frontend/apps/handoff/**'
      - 'frontend/packages/**'
      - '.github/workflows/frontend_e2e_auth_chromium.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  CI: true
  SKIP_JOBS: false
  E2E_AUTH_BASE_URL: http://localhost:3011
  E2E_DEMOS_BASE_URL: http://localhost:3002
  E2E_UPDATE_UTOKEN: ''
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_TEAM_ID: 'footprint'
  VERCEL_PROJECT_ID_DEMOS: 'prj_LBgEpZnmdIAi10IeHtVD0RKTbQmW'
  VERCEL_PROJECT_ID_AUTH: 'prj_DteDBAItHKWrh6MJgdG3bugubNRH'
  VERCEL_AWAIT_TIMEOUT_SEC: 240
  VERCEL_AWAIT_POLL_INTERVAL_SEC: 5

jobs:
  e2e:
    # if: ${{ contains(github.event.pull_request.labels.*.name, 'e2e-on') }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x]
        os: [ubuntu-latest]
    name: 'End-to-End test'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3

      - name: Restore node modules cache
        uses: actions/cache@v3
        id: cache-dependencies
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install node_modules if not cached
        working-directory: ./frontend
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      - name: Install Playwright dependencies [chromium]
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Get Vercel auth preview_url
        uses: zentered/vercel-preview-url@v1.1.9
        continue-on-error: true
        id: vercel_auth_url
        with:
          vercel_team_id: ${{ env.VERCEL_TEAM_ID }}
          vercel_project_id: ${{ env.VERCEL_PROJECT_ID_AUTH }}

      - name: Set E2E_AUTH_BASE_URL
        if: ${{ env.SKIP_JOBS != 'true' }}
        run: |
          if [ "${{ steps.vercel_auth_url.outputs.deployment_state }}" = "CANCELED" ] || \
              [ "${{ steps.vercel_auth_url.outputs.deployment_state }}" = "ERROR" ] || \
              [ -z "${{ steps.vercel_auth_url.outputs.deployment_state }}" ] || \
              [ "${{ steps.vercel_auth_url.outputs.deployment_state }}" = "null" ]; then
            echo "Workflow canceled due to auth url preview cancellation."
            echo "SKIP_JOBS=true" >> $GITHUB_ENV
          fi
          export E2E_AUTH_BASE_URL="https://${{ steps.vercel_auth_url.outputs.preview_url }}"
          echo "E2E_AUTH_BASE_URL=${E2E_AUTH_BASE_URL}" >> $GITHUB_ENV

      - name: Get Vercel demos preview_url
        uses: zentered/vercel-preview-url@v1.1.9
        id: vercel_demos_url
        if: ${{ env.SKIP_JOBS != 'true' }}
        continue-on-error: true
        with:
          vercel_team_id: ${{ env.VERCEL_TEAM_ID }}
          vercel_project_id: ${{ env.VERCEL_PROJECT_ID_DEMOS }}

      - name: Set E2E_DEMOS_BASE_URL
        if: ${{ env.SKIP_JOBS != 'true' }}
        run: |
          if [ "${{ steps.vercel_demos_url.outputs.deployment_state }}" = "CANCELED" ] || \
              [ "${{ steps.vercel_demos_url.outputs.deployment_state }}" = "ERROR" ] || \
              [ -z "${{ steps.vercel_demos_url.outputs.deployment_state }}" ] || \
              [ "${{ steps.vercel_demos_url.outputs.deployment_state }}" = "null" ]; then
            echo "Workflow canceled due to demos_url preview cancellation."
            echo "SKIP_JOBS=true" >> $GITHUB_ENV
          fi
          export E2E_DEMOS_BASE_URL="https://${{ steps.vercel_demos_url.outputs.preview_url }}"
          echo "E2E_DEMOS_BASE_URL=${E2E_DEMOS_BASE_URL}" >> $GITHUB_ENV

      - name: Wait for auth preview_url to be ready
        uses: UnlyEd/github-action-await-vercel@v1
        id: await-vercel-auth
        if: >
          steps.vercel_auth_url.outputs.deployment_state != 'CANCELED' &&
          steps.vercel_auth_url.outputs.deployment_state != 'ERROR' &&
          env.SKIP_JOBS != 'true'
        continue-on-error: true
        with:
          deployment-url: ${{ steps.vercel_auth_url.outputs.preview_url }}
          timeout: ${{ env.VERCEL_AWAIT_TIMEOUT_SEC }}
          poll-interval: ${{ env.VERCEL_AWAIT_POLL_INTERVAL_SEC }}

      - name: Wait for demos preview_url to be ready
        uses: UnlyEd/github-action-await-vercel@v1
        id: await-vercel-demos
        if: >
          steps.vercel_demos_url.outputs.deployment_state != 'CANCELED' &&
          steps.vercel_demos_url.outputs.deployment_state != 'ERROR' &&
          env.SKIP_JOBS != 'true'
        continue-on-error: true
        with:
          deployment-url: ${{ steps.vercel_demos_url.outputs.preview_url }}
          timeout: ${{ env.VERCEL_AWAIT_TIMEOUT_SEC }}
          poll-interval: ${{ env.VERCEL_AWAIT_POLL_INTERVAL_SEC }}

      - name: Set E2E_UPDATE_UTOKEN
        if: ${{ env.SKIP_JOBS != 'true' }}
        run: |
          E2E_UPDATE_UTOKEN=$(curl -s https://api.dev.onefootprint.com/users/fp_id_test_rJBzCaVzkYQgWIfr0qtFDC/token -X POST -d '{"kind": "user"}' -u ${{ secrets.E2E_ACME_SECRET_API_KEY_DEV }}: | jq -r '.token')
          echo "E2E_UPDATE_UTOKEN=${E2E_UPDATE_UTOKEN}" >> $GITHUB_ENV

      - name: Sleep for 10 seconds
        if: ${{ env.SKIP_JOBS != 'true' }}
        run: sleep 10

      - name: Run Playwright tests
        if: ${{ env.SKIP_JOBS != 'true' }}
        working-directory: ./frontend
        env:
          E2E_UPDATE_UTOKEN: ${{ env.E2E_UPDATE_UTOKEN }}
          E2E_DEMOS_BASE_URL: ${{ env.E2E_DEMOS_BASE_URL }}
          E2E_AUTH_BASE_URL: ${{ env.E2E_AUTH_BASE_URL }}
        run: yarn workspace @onefootprint/e2e test:e2e:auth-ci --project chromium

      - name: Upload artifacts
        if: ${{ env.SKIP_JOBS != 'true' }}
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: ./frontend/packages/e2e/test-results/
          retention-days: 3
        # with:
        #   name: all-blob-reports
        #   path: ./frontend/packages/e2e/blob-report/
        #   retention-days: 3

