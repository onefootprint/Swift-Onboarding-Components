name: Frontend Lighthouse CI

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/frontend_lighthouse_ci.yml'
      - 'frontend/apps/bifrost/**'
      - 'frontend/apps/demos/**'
      - 'frontend/apps/handoff/**'
      - 'frontend/packages/**'
  pull_request:
    paths:
      - '.github/workflows/frontend_lighthouse_ci.yml'
      - 'frontend/apps/bifrost/**'
      - 'frontend/apps/demos/**'
      - 'frontend/apps/handoff/**'
      - 'frontend/packages/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  GHOST_API_URL: 'https://footprint-blog.ghost.io' # Required by demos project
  GHOST_CONTENT_API_KEY: ${{ secrets.GHOST_CONTENT_API_KEY }} # Required by demos project

jobs:
  install-dependencies:
    name: Install dependencies
    runs-on: frontend_runner
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3

      - name: Cache management for "frontend/node_modules"
        uses: actions/cache@v3
        id: cache-dependencies
        with:
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          path: frontend/node_modules
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install "frontend/node_modules" if not cached
        working-directory: ./frontend
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

  build-apps:
    name: Build and cache
    runs-on: frontend_runner
    needs: install-dependencies
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3

      - name: Fetching "frontend/node_modules"
        uses: actions/cache@v3
        id: cache-dependencies
        with:
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          path: frontend/node_modules
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Build and cache "bifrost,handoff,demos" apps
        uses: actions/cache@v3
        id: cache-build-bhd
        with:
          key: ${{ runner.os }}-bhd-${{ hashFiles('**/yarn.lock') }}
          path: |
            frontend/apps/bifrost/.next
            frontend/apps/handoff/.next
            frontend/apps/demos/.next
          restore-keys: |
            ${{ runner.os }}-bhd-
      - name: Build "bifrost,handoff,demos" apps if not cached
        working-directory: ./frontend
        if: steps.cache-build-bhd.outputs.cache-hit != 'true'
        run: yarn build --filter=bifrost... --filter=handoff... --filter=demos...

  lhci:
    name: Lighthouse
    runs-on: frontend_runner
    needs: build-apps
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3

      - name: Fetching "frontend/node_modules"
        uses: actions/cache@v3
        id: cache-dependencies
        with:
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          path: frontend/node_modules
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Fetching "bifrost,handoff,demos" apps
        uses: actions/cache@v3
        id: cache-build-bhd
        with:
          key: ${{ runner.os }}-bhd-${{ hashFiles('**/yarn.lock') }}
          path: |
            frontend/apps/bifrost/.next
            frontend/apps/handoff/.next
            frontend/apps/demos/.next
          restore-keys: |
            ${{ runner.os }}-bhd-

      - name: run Lighthouse CI
        working-directory: ./frontend
        run: |
          npm install -g @lhci/cli
          lhci autorun --config=.lighthouserc.js
