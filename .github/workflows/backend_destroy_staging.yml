name: [Backend] Destroy staging
on:
  pull_request:
    types: [closed]
    branches:
      - "staging/**"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  destroy_staging_stack:
    name: Destroy staging stack
    runs-on: ubuntu-latest
    environment: production
    if: github.actor != 'dependabot[bot]' && ((github.event_name != 'pull_request') || (github.event_name == 'pull_request' && contains( github.event.pull_request.labels.*.name, 'release')))

    steps:
      - uses: actions/checkout@v2
      - run: cd backend/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # pulumi setup
      - uses: actions/setup-node@v2
        with:
          node-version: 14.x

      - run: npm install
        working-directory: ./infra

      # bring down the staging stack
      - uses: pulumi/actions@v3
        with:
          command: destroy
          work-dir: infra
          stack-name: "footprint/staging"
          message: "Destroyed staging environment"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
