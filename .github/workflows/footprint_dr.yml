name: footprint-dr

on:
  push:
    branches:
      - master
    tags:
      - 'footprint-dr-*'
    paths:
      - 'backend/external_tools/footprint-dr/**'
      - 'backend/Cargo.lock'
      - '.github/footprint_dr_build.yml'
  pull_request:
    paths:
      - 'backend/external_tools/footprint-dr/**'
      - 'backend/Cargo.lock'
      - '.github/footprint_dr_build.yml'

jobs:
  build:
    name: Build footprint-dr
    strategy:
      matrix:
        include:
          - target: 'x86_64-unknown-linux-musl'
            os: 'ubuntu-20.04'
            muslrust: true
          - target: 'aarch64-apple-darwin'
            os: 'macOS-14'
            muslrust: false

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # ratchet:actions/checkout@v4

      - name: Build footprint-dr (muslrust container)
        if: ${{ matrix.muslrust }}
        working-directory: ./backend
        run: |
          docker run \
            --rm \
            -v ${PWD}:/backend \
            -w /backend \
            clux/muslrust:1.79.0-stable \
            bash -c "apt-get update && apt-get install -y clang && cargo build --release -p footprint-dr"

      - name: Set up Rust
        if: ${{ !matrix.muslrust }}
        uses: dtolnay/rust-toolchain@8be9e387b07ce3b7674d8037a26b3c8d72b6e510 # ratchet:dtolnay/rust-toolchain@1.79.0

      - name: Build footprint-dr (native)
        if: ${{ !matrix.muslrust }}
        working-directory: ./backend
        run: cargo build --release -p footprint-dr --target ${{ matrix.target }}

      - name: Test CLI version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ./backend
        run: |
          set -euxo pipefail

          tag_version=${{github.ref_name}}
          cli_version=$(./target/${{ matrix.target }}/release/footprint-dr -V | sed 's/footprint-dr /footprint-dr-/')
          if [ "$tag_version" != "$cli_version" ]; then
            echo "Tag $tag_version does not match CLI version $cli_version"
            exit 1
          fi

      - name: Compress the binary
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ./backend/target/${{ matrix.target }}/release/
        run: tar -czf ../../../out/${{github.ref_name}}-${{ matrix.target }}.tar.gz footprint-dr

      - name: Upload artifacts for release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # ratchet:actions/upload-artifact@v4
        with:
          name: ${{github.ref_name}}-${{ matrix.target }}.tar.gz
          path: ./backend/out/${{github.ref_name}}-${{ matrix.target }}.tar.gz

  release:
    name: Publish private release for footprint-dr
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # ratchet:actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'footprint-dr-*.tar.gz'
          merge-multiple: true
      - name: Create release
        run: |
          gh release create ${{github.ref_name}} artifacts/*.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}





