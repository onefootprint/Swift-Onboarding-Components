name: Backend Refresh Stack

on:
  workflow_dispatch:
    inputs:
      stackName:
        description: 'Name of the stack to refresh'
        required: true
        type: string
        default: 'dev'

      environment:
        description: 'Environment to run against'
        type: environment
        required: true

jobs:
  refresh_stack:
    name: Refresh Stack
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v2

      # pulumi setup
      - uses: actions/setup-node@v2
        with:
          node-version: 14.x

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Pulumi CLI
        uses: pulumi/setup-pulumi@v2.0.0
        with:
          pulumi-version: 3.39.1

      - run: yarn install
        working-directory: ./backend/infra

      # bring up the stack
      - uses: pulumi/actions@v3
        with:
          command: refresh
          work-dir: ./backend/infra
          stack-name: 'footprint/${{ github.event.inputs.stackName }}'
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
