name: Backend CI

on:
  push:
    paths:
      - 'backend/**'

    branches:
      - master

  pull_request:
    paths:
      - 'backend/**'

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-ci-check-test
  cancel-in-progress: true

jobs:
  check_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libpq-dev

      - uses: actions/checkout@v3

      - name: rust-toolchain
        uses: actions-rs/toolchain@v1.0.6
        with:
          toolchain: stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.0.0
        with:
          workspaces: |
            backend

      - name: Check
        working-directory: ./backend
        run: cargo check --all --no-default-features --features simulate

      - name: Build
        working-directory: ./backend
        run: cargo build --all --no-default-features --features simulate

      - name: Run tests
        working-directory: ./backend
        run: cargo test --all --no-default-features --features simulate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/postgres

  integration_tests:
    name: integration + migrations
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      matrix:
        python-version: ['3.9']
    services:
      postgres:
        image: postgres:10.18
        env:
          POSTGRES_USER: 'runner'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      PR_NUMBER: ${{ github.event.number }}
      TEST_URL: 'http://localhost:8000'
    if: success()
    steps:
      - name: Install libpq + libssl
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libpq-dev

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Create footprint db
        run: |
          psql -h localhost -c 'create database footprint_db;'

      - uses: actions/checkout@v3

      - name: Set dot env
        working-directory: ./backend
        run: make set-dot-env

      - name: rust-toolchain
        uses: actions-rs/toolchain@v1.0.6
        with:
          toolchain: stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.0.0
        with:
          workspaces: |
            backend

      - name: Setup Python # Set Python version
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install python deps
        working-directory: ./backend/ci
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run local integration tests
        working-directory: ./backend
        run: |
          cargo build -p enclave
          cargo build -p footprint-core
                    
          make run-local &
          server_pid=$!

          attempt_counter=0
          max_attempts=48

          until $(curl --output /dev/null --silent --fail http://localhost:8000); do
              if [ ${attempt_counter} -eq ${max_attempts} ];then
                echo "Max attempts reached"
                exit 1
              fi

              printf '.'
              attempt_counter=$(($attempt_counter+1))
              sleep 10
          done
          cd ci
          set -o pipefail
          pytest tests/ --emoji 2>&1 | tee integration_test_output.txt
          kill $server_pid

      - name: Comment markdown on PR
        working-directory: ./backend/ci
        run: |
          FINISH=`awk '/===/{ print NR; }' integration_test_output.txt | sed -n 2p`
          CROP=$(expr $FINISH - 1)
          BEGIN=$(expr $FINISH - 7)
          cat integration_test_output.txt
          head -n $CROP integration_test_output.txt | tail -n $BEGIN > out.txt
          sed -i 's/\[.*%\]//g' out.txt
          sed -i 's/tests/* tests/g' out.txt
          echo '# :footprints: Footprint Core: Local Test Report' > tmp.txt
          echo 'Tests organized by file' >> tmp.txt
          cat out.txt >> tmp.txt
          COMMENT="$(awk '{printf "%s\\n", $0}' tmp.txt)"
          comments_url=$(curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/onefootprint/monorepo/pulls/$PR_NUMBER" | jq '._links.comments.href' | sed 's/\"//g')
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$comments_url" -d "{\"body\": \" $COMMENT \" }"
        # only run on PRs
        if: ${{ github.ref != 'refs/heads/master' && (success() || failure()) }}

      - name: Install diesel cli
        run: cargo install diesel_cli --no-default-features --features postgres

      - name: Check valid db migrations
        working-directory: ./backend/components/db
        run: |
          NUM_FILES=`ls migrations | wc -l`
          NUM_TO_REVERT=$(( $NUM_FILES < 4 ? $NUM_FILES : 4 ))
          echo "Reverting $NUM_TO_REVERT migrations"

          for ((i=0; i<$NUM_TO_REVERT; i++))
          do
            echo $i
            diesel migration revert
            if [ $? -ne 0 ]; then
              echo "failed to properly revert"
              exit 1
            fi
          done

          echo "Reverted $NUM_TO_REVERT migrations, running again"

          diesel migration run
          if [ $? -ne 0 ]; then
            echo "failed to properly restore"
            exit 1
          fi

  clippy:
    name: 'Clippy'
    runs-on: ubuntu-latest

    steps:
      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libpq-dev

      - uses: actions/checkout@v3

      - name: rust-toolchain
        uses: actions-rs/toolchain@v1.0.6
        with:
          toolchain: stable
          components: clippy

      - uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --manifest-path ./backend/Cargo.toml
