name: Backend CI

on:
  push:
    branches:
      - master
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-ci-check-test
  cancel-in-progress: true

jobs:
  files-changed:
    name: Determine if relevant files changed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@affb29871ab1f927ecad0ee68c0989584101408f
        id: changes
        with:
          filters: |
            src:
              - 'backend/**'
              - '.github/**'
    outputs:
      filesChanged: ${{ steps.changes.outputs.src }}

  test:
    needs: [files-changed]
    if: needs.files-changed.outputs.filesChanged == 'true'
    runs-on: 16core
    environment: dev
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libpq-dev

      - uses: actions/checkout@v4

      - name: rust-toolchain
        uses: dtolnay/rust-toolchain@1.77.0

      - uses: rui314/setup-mold@7f56dbde35ee02a3fe0287e7ddd310922eb5f553
        with:
          mold-version: 2.0.0
          make-default: false

      - name: Rust Cache
        uses: Swatinem/rust-cache@23bce251a8cd2ffc3c1075eaa2367cf899916d84
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}
          shared-key: backend-test
          cache-all-crates: true
          workspaces: |
            backend

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@010d0da01d0b5a38af31e9c3470dbfdabdecca3a #4.0.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Set dot env
        working-directory: ./backend
        run: make set-dot-env

      - name: Run tests
        working-directory: ./backend
        run: cargo test --all --no-default-features --features simulate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/postgres

  clippy:
    needs: [files-changed]
    if: needs.files-changed.outputs.filesChanged == 'true'
    runs-on: 16core
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: rust-toolchain
        uses: dtolnay/rust-toolchain@1.77.0
        with:
          components: clippy

      - uses: rui314/setup-mold@7f56dbde35ee02a3fe0287e7ddd310922eb5f553
        with:
          mold-version: 2.0.0
          make-default: false

      - name: Rust Cache
        uses: Swatinem/rust-cache@23bce251a8cd2ffc3c1075eaa2367cf899916d84
        with:
          save-if: false
          shared-key: backend-test
          workspaces: |
            backend

      - name: Clippy
        working-directory: ./backend
        run: cargo clippy --all --no-default-features --features simulate

  integration_tests:
    needs: [files-changed]
    if: needs.files-changed.outputs.filesChanged == 'true'
    runs-on: 16core
    environment: dev
    services:
      postgres:
        image: postgres:14.3
        env:
          POSTGRES_USER: 'runner'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      PR_NUMBER: ${{ github.event.number }}
      TEST_URL: 'http://localhost:8000'
      EXPECTED_SERVER_VERSION: ${{ github.sha }}
      IT_PHONE_NUMBERS: '["+1 202 952 1443", "+1 202 831 8398", "+1 202 946 3154", "+1 202 937 0987", "+1 202 759 2344", "+1 202 946 1521", "+1 202 998 5931", "+1 202 952 9077", "+1 202 740 9135", "+1 202 519 1954"]'
      ENVIRONMENT: ci
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/backend_run_local
        id: backend_run_local
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_region: ${{ secrets.AWS_REGION }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Python # Set Python version
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Install python dependencies
        working-directory: ./backend/ci
        run: |
          set -ox pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run local integration tests
        working-directory: ./backend/ci
        run: |
          set -ox pipefail
          pytest -n 6 tests/ 2>&1 | tee integration_test_output.txt
          kill ${{ steps.backend_run_local.outputs.server_pid }}

      - name: Create results for PR
        id: test_results
        if: ${{ github.ref != 'refs/heads/master' && (success() || failure()) }}
        working-directory: ./backend/ci
        run: |
          SHORT_SUMMARY=$(cat integration_test_output.txt | awk '/short test summary info/,0')
          FINISH=`awk '/===/{ print NR; }' integration_test_output.txt | sed -n 2p`
          CROP=$(expr $FINISH - 1)
          BEGIN=$(expr $FINISH - 7)
          cat integration_test_output.txt
          head -n $CROP integration_test_output.txt | tail -n $BEGIN > out.txt
          sed -i 's/\[.*%\]//g' out.txt
          sed -i 's/tests/* tests/g' out.txt
          echo '### Local integration tests' > test_out.txt
          cat out.txt >> test_out.txt
          echo -e "$SHORT_SUMMARY" >> test_out.txt
          COMMENT="$(cat test_out.txt)"
          COMMENT="${COMMENT//'%'/'%25'}"
          COMMENT="${COMMENT//$'\n'/'%0A'}"
          COMMENT="${COMMENT//$'\r'/'%0D'}"
          echo "::set-output name=body::$COMMENT"

      - name: Find local comment
        uses: peter-evans/find-comment@v2.0.0
        if: ${{ github.ref != 'refs/heads/master' && (success() || failure()) }}
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Local integration tests'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v2.0.0
        if: ${{ github.ref != 'refs/heads/master' && (success() || failure()) }}
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ${{ steps.test_results.outputs.body }}
          edit-mode: replace

      - name: Install diesel cli
        run: cargo install diesel_cli --version 2.0.0 --no-default-features --features postgres

      - name: Check valid db migrations
        working-directory: ./backend/components/db/schema
        run: |
          NUM_FILES=`ls migrations | wc -l`
          NUM_TO_REVERT=$(( $NUM_FILES < 1 ? $NUM_FILES : 1 ))
          echo "Reverting $NUM_TO_REVERT migrations"

          for ((i=0; i<$NUM_TO_REVERT; i++))
          do
            echo $i
            diesel migration revert
            if [ $? -ne 0 ]; then
              echo "failed to properly revert"
              exit 1
            fi
          done

          echo "Reverted $NUM_TO_REVERT migrations, running again"

          diesel migration run
          if [ $? -ne 0 ]; then
            echo "failed to properly restore"
            exit 1
          fi

  # Branch protections require this job to pass. If any of the `needs` fail, then this job will fail.
  # Add all jobs in this workflow to this job's `needs`
  backend-ci:
    runs-on: ubuntu-latest
    needs: [test, clippy, integration_tests]
    if: always()
    steps:
      - name: Success
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Fail
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
