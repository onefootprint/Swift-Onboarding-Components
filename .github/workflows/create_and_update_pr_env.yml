name: Pulumi
on:
  pull_request:
    types: [reopened, opened, synchronize, edited]
jobs:
  ephemeral_stack:
    name: Ephemeral Stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      # build the container
      - run: make debug
      
      # pulumi setup
      - uses: actions/setup-node@v2
        with:
          node-version: 14.x
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          
      - name: Setup Pulumi CLI
        uses: pulumi/setup-pulumi@v2.0.0            
      - run: npm install
        working-directory: infra
      - name: Extract branch name
        shell: bash
        run: |
          branch=$(echo $GITHUB_HEAD_REF | sed -r 's/\//-/g' | sed -r 's/_/-/g')
          echo "##[set-output name=branch;]$(echo ${branch})"
        id: extract_branch        
        
      # create our temp stack
      - run: pulumi stack init --copy-config-from "footprint/dev" "footprint/dev-${branch}"
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          
      # bring up the ephemeral stack
      - uses: pulumi/actions@v3
        with:
          command: up
          work-dir: infra
          stack-name: "footprint/dev-${branch}"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
