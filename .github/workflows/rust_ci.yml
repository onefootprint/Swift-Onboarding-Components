name: Rust Check & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev libpq-dev
        
    - uses: actions/checkout@v3

    - name: rust-toolchain
      uses: actions-rs/toolchain@v1.0.6
      with:
        toolchain: stable
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v1.3.0
        
    - name: Check
      run: cargo check --all --no-default-features --features simulate  
      
    - name: Build
      run: cargo build --all --no-default-features --features simulate  
      
    - name: Run tests
      run: cargo test --all --no-default-features --features simulate  
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost/postgres
