name: Deploy Staging
on:
  pull_request:
    types: [reopened, opened, synchronize, edited]
    branches:
      - "production"
    paths:
      - "components/**/*"
      - "infra/*"
      - "infra/**/*"
      - "*.dockerfile"
      - ".github/workflows/*.yml"

concurrency:
  group: ${{ github.workflow }}-staging
  cancel-in-progress: true

jobs:
  deploy_staging_stack:
    name: staging
    uses: ./.github/workflows/build_and_deploy.yml
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    with:
      environment: production
      baseStackName: prod
      createStack: true
      stackName: "staging"
      baseDomain: "staging.onefootprint.com"
      prefixDomain: "api."

    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ENCLAVE_SIGNING_KEY: ${{ secrets.ENCLAVE_SIGNING_KEY }}
      ENCLAVE_SIGNING_CERT: ${{ secrets.ENCLAVE_SIGNING_CERT }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      AWS_SECRETS_PROVIDER: ${{ secrets.AWS_SECRETS_PROVIDER }}

  run_tests:
    name: "staging integration tests"
    needs: [deploy_staging_stack]
    if: success()
    uses: ./.github/workflows/remote_integration_tests.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      testUrl: "${{ needs.deploy_staging_stack.outputs.url }}"
      prNumber: ${{ github.event.number }}
      isPR: true
    secrets:
      INTEGRATION_TEST_PHONE_NUMBER: ${{ secrets.INTEGRATION_TEST_PHONE_NUMBER }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_API_KEY: ${{ secrets.TWILIO_API_KEY }}
      TWILIO_API_KEY_SECRET: ${{ secrets.TWILIO_API_KEY_SECRET }}
