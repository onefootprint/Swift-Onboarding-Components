name: Backend Deploy Production

on:
  #
  # NOTE: for now we are auto-deploying to prod if tests pass!
  #
  workflow_run:
    workflows: ["Backend Deploy Dev"]
    types:
      - completed

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-deploy-prod

jobs:
  deploy_stack_prod:
    name: Deploy stack
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/backend_build_and_deploy.yml
    with:
      environment: production
      baseStackName: prod
      stackName: prod
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ENCLAVE_SIGNING_KEY: ${{ secrets.ENCLAVE_SIGNING_KEY }}
      ENCLAVE_SIGNING_CERT: ${{ secrets.ENCLAVE_SIGNING_CERT }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      AWS_SECRETS_PROVIDER: ${{ secrets.AWS_SECRETS_PROVIDER }}

  sentry_release:
    name: "Sentry Release Integration"
    runs-on: ubuntu-latest
    needs: [deploy_stack_prod]
    environment: production
    steps:
      - uses: actions/checkout@v2
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: onefootprint
          SENTRY_PROJECT: backend
        with:
          environment: production

  run_tests:
    name: "integration tests"
    needs: [deploy_stack_prod]
    if: success()
    uses: ./.github/workflows/backend_remote_integration_tests.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      testUrl: "${{ needs.deploy_stack_prod.outputs.url }}"
      isPR: false
      waitForDeploy: true
    secrets:
      INTEGRATION_TEST_PHONE_NUMBER: ${{ secrets.INTEGRATION_TEST_PHONE_NUMBER }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_API_KEY: ${{ secrets.TWILIO_API_KEY }}
      TWILIO_API_KEY_SECRET: ${{ secrets.TWILIO_API_KEY_SECRET }}

  notify_slack:
    if: ${{ github.event_name == 'push' }}
    needs: [deploy_stack_prod]
    runs-on: ubuntu-latest
    steps:
      - name: Notify on slack
        id: slack
        uses: slackapi/slack-github-action@v1.21.0
        with:
          payload: |
            {
              "user": "${{ github.event.pusher.name }}",
              "environment": "[Backend PROD]",
              "url": "${{ needs.deploy_stack_prod.outputs.url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.RELEASE_BOT_SLACK_WEBHOOK_URL }}
