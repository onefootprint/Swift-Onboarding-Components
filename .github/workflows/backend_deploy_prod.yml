name: Backend Deploy Production

on:
  #
  # NOTE: for now we are auto-deploying to prod if tests pass!
  #
  workflow_run:
    workflows: ['Backend Deploy Dev']
    types:
      - completed

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-deploy-prod

jobs:
  extract_commit_hash:
    # Since the prod deploy job can be triggered by either a successful prod deploy or a manual trigger,
    # we have to extract out the commit hash that is meant to be deployed by each job run.
    # The special case is when the prod deploy is triggered by a successful dev deploy: we look at
    # the commit that was used to run the successful dev deploy.
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch'
    name: Compute commit hash
    outputs:
      commitHashToDeploy: '${{ steps.constants.outputs.commitHashToDeploy }}'
    steps:
      - name: Hash
        shell: bash
        id: constants
        run: |
          echo "commit hash from workflow_run ${{ github.event.workflow_run.head_commit.id }}"
          echo "commit hash over branch HEAD ${{ github.sha }}"
          commit_hash="${{ github.event.workflow_run.head_commit.id || github.sha }}"
          echo "##[set-output name=commitHashToDeploy;]$(echo ${commit_hash})"

  deploy_stack_prod:
    name: Deploy stack
    needs: [extract_commit_hash]
    if: success()
    uses: ./.github/workflows/backend_build_and_deploy.yml
    with:
      environment: production
      baseStackName: prod
      stackName: prod
      commitHash: ${{ needs.extract_commit_hash.outputs.commitHashToDeploy }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ENCLAVE_SIGNING_KEY: ${{ secrets.ENCLAVE_SIGNING_KEY }}
      ENCLAVE_SIGNING_CERT: ${{ secrets.ENCLAVE_SIGNING_CERT }}
      PULUMI_CLOUD_URL: ${{ secrets.PULUMI_CLOUD_URL }}
      AWS_SECRETS_PROVIDER: ${{ secrets.AWS_SECRETS_PROVIDER }}
      AIRPLANE_API_KEY: ${{ secrets.AIRPLANE_API_KEY }}

  sentry_release:
    name: 'Sentry Release Integration'
    runs-on: ubuntu-latest
    if: success()
    needs: [extract_commit_hash, deploy_stack_prod]
    environment: production
    steps:
      - uses: actions/checkout@v2
        with:
          ref: ${{ needs.extract_commit_hash.outputs.commitHashToDeploy }}
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: onefootprint
          SENTRY_PROJECT: backend
        with:
          environment: production

  run_tests:
    name: 'integration tests'
    needs: [deploy_stack_prod, extract_commit_hash]
    if: success()
    uses: ./.github/workflows/backend_remote_integration_tests.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      testUrl: '${{ needs.deploy_stack_prod.outputs.url }}'
      isPR: false
      waitForDeploy: true
      expectedCommitHash: ${{ needs.extract_commit_hash.outputs.commitHashToDeploy }}
      environment: production
    secrets:
      IT_PHONE_NUMBERS: ${{ secrets.IT_PHONE_NUMBERS }}
      IT_TWILIO_ACCOUNT_SID: ${{ secrets.IT_TWILIO_ACCOUNT_SID }}
      IT_TWILIO_SECRET_AUTH_TOKEN: ${{ secrets.IT_TWILIO_SECRET_AUTH_TOKEN }}
      SVIX_AUTH_TOKEN: ${{ secrets.SVIX_AUTH_TOKEN }}

  notify_slack:
    needs: [deploy_stack_prod]
    runs-on: ubuntu-latest
    steps:
      - name: Notify on slack
        id: slack
        uses: slackapi/slack-github-action@v1.21.0
        with:
          payload: |
            {
              "user": "${{ github.triggering_actor }}",
              "environment": "[Backend PROD]",
              "url": "${{ needs.deploy_stack_prod.outputs.url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.RELEASE_BOT_SLACK_WEBHOOK_URL }}
