name: Frontend E2E

on:
  pull_request:
    paths:
      - '.github/workflows/frontend_e2e.yml'
      - 'frontend/apps/bifrost/**'
      - 'frontend/apps/handoff/**'
      - 'frontend/packages/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  CI: true
  IS_E2E: true
  E2E_BASE_URL: http://localhost:3002
  API_BASE_URL: https://api.dev.onefootprint.com
  NEXT_PUBLIC_API_BASE_URL: https://api.dev.onefootprint.com
  NEXT_PUBLIC_GOOGLE_MAPS_KEY: AIzaSyCgSmhug-DYfU5ozUNCyTfKyVX3VvPTSUs
  NEXT_PUBLIC_E2E_TENANT_PK: ob_test_Gw8TsnS2xWOYazI0pugdxu

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: frontend_runner
    steps:
      - name: Checkout the project
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: ./frontend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./frontend

      - name: Build Bifrost, Handoff and Demos
        run: yarn build --filter=bifrost... --filter=handoff... --filter=demos...
        working-directory: ./frontend

      - name: Run apps locally, using production mode
        run: yarn start --filter=bifrost --filter=handoff --filter=demos &
        working-directory: ./frontend

      - name: Run Playwright tests
        working-directory: ./frontend
        run: yarn test:e2e:ci

      - name: Stop web servers
        working-directory: ./frontend
        run: npx kill-port 3000 3002 3005

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: ./frontend/packages/e2e/test-results/
          retention-days: 3