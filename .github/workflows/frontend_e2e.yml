name: Frontend Smoke Tests
on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/packages/**'
      - 'frontend/apps/demo/**'
      - 'frontend/apps/handoff/**'
      - 'frontend/apps/bifrost/**'
      - '.github/workflows/*.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  API_BASE_URL: 'https://api.dev.onefootprint.com'
  FORCE_FOOTPRINT_JS_TO_USE_LOCAL: true
  GHOST_API_URL: 'https://footprint-blog.ghost.io'
  GHOST_CONTENT_API_KEY: 'dfe204e4a358893912bf3b50f9'
  NEXT_PUBLIC_API_BASE_URL: 'https://api.dev.onefootprint.com'
  NEXT_PUBLIC_GOOGLE_MAPS_KEY: 'AIzaSyCgSmhug-DYfU5ozUNCyTfKyVX3VvPTSUs'
  NEXT_PUBLIC_TENANT_KEY: 'ob_test_CnzlAM1i4ce9IV5EsIxFbn'
  REVALIDATE_SECRET_TOKEN: 'ECgdRpW1ZO54LORCul3r'
  TURBO_REMOTE_ONLY: true
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  install-dependencies:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [16.x]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Restore node modules cache
        uses: actions/cache@v3
        id: cache-dependencies
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install node_modules if not cached
        working-directory: ./frontend
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [16.x]
        os: [ubuntu-latest]
    needs: install-dependencies
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Restore yarn dependencies
        uses: actions/cache@v3
        id: cache-dependencies
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Build apps
        working-directory: frontend
        run: |
          yarn build:packages
          yarn build --filter=bifrost
          yarn build --filter=demo

      - name: Run tests
        working-directory: frontend
        run: yarn test:e2e:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: |
            frontend/apps/demos/playwright-report/
            frontend/apps/demos/tests/media/
          retention-days: 5
