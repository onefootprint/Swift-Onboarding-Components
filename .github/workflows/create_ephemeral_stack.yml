name: Push Ephemeral Stack
on:
  pull_request:
    types: [labeled, reopened, opened, synchronize, edited]
    branches:    
      - 'master'    
    paths:
      - 'components/**/*'
      - 'infra/**/*'      
      - '*.dockerfile'
      - '.github/workflows/create_ephemeral_stack.yml'
      - '.github/workflows/build_and_deploy.yml'

concurrency: 
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  ephemeral_stack_name:    
    name: Get ephemeral environment name
    runs-on: ubuntu-latest    
    outputs:
      stackName: ${{ steps.constants.outputs.branch }}
    steps:
      - uses: actions/checkout@v2        
      - name: Extract Constants
        id: constants
        shell: bash
        run: |          
          branch_raw="${{ github.head_ref }}"
          branch="$(echo ${branch_raw} | sed -r 's/\//-/g' | sed -r 's/_/-/g')"
          echo "friendly branch name is ${branch}"
          echo "::set-output name=branch::$(echo ${branch})"


  deploy_ephemeral_stack:    
    name: ephemeral
    needs: [ephemeral_stack_name]
    uses: ./.github/workflows/build_and_deploy.yml
    # don't run for dependabot changes and only run when labeled ephemerla
    if: github.actor != 'dependabot[bot]' && contains( github.event.pull_request.labels.*.name, 'ephemeral')
    permissions:
      contents: write
      pull-requests: write
    with:
      environment: dev      
      baseStackName: dev      
      ephemeral: true
      stackName: "dev-${{ needs.ephemeral_stack_name.outputs.stackName }}"
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ENCLAVE_SIGNING_KEY: ${{ secrets.ENCLAVE_SIGNING_KEY }}      
      ENCLAVE_SIGNING_CERT: ${{ secrets.ENCLAVE_SIGNING_CERT }}        
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      AWS_SECRETS_PROVIDER: ${{ secrets.AWS_SECRETS_PROVIDER }}
    
  run_tests:
    name: run integration tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9"]
    env:
      PR_NUMBER: ${{ github.event.number }}
      TEST_URL: "${{ needs.deploy_ephemeral_stack.outputs.url }}"
    needs: [deploy_ephemeral_stack]
    if: success()
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python # Set Python version
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        working-directory: ci
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Integration testing
        working-directory: ci
        run: pytest -q integration_tests.py --emoji -v --md report.md --html report.html --self-contained-html
      - name: Comment markdown on PR
        working-directory: ci
        run: |
          COMMENT="$(awk '{printf "%s\\n", $0}' report.md)"
          comments_url=$(curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/onefootprint/footprint-core/pulls/$PR_NUMBER" | jq '._links.comments.href' | sed 's/\"//g')
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$comments_url" -d "{\"body\": \"$COMMENT\" }"
        if: ${{ always() }}
      - name: Upload pytest test results
        uses: actions/upload-artifact@v3
        with:
          name: integ-tests-results-${{ matrix.python-version }}
          path: ci/report.html
        # Use always() to always run this step to publish test results when there are test failures
        if: ${{ always() }}
