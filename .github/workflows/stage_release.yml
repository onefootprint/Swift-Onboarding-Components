name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  workflow_dispatch:
    inputs:
      version:
        description: "Version name"
        required: true
        type: string

jobs:
  staging_pr:
    name: Create Staging PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: extract version name
        id: version_name
        run: |
          version=${{inputs.version}} || ${GITHUB_REF##*/}
          echo "##[set-output name=version;]$(echo ${version})"

      - name: create branch        
        run: |
          git checkout -b "staging/release-${{ steps.version_name.outputs.version }}"

      - name: Create Pull Request
        uses: actions/github-script@v6
        with:
          script: |
            const { repo, owner } = context.repo;
            const result = await github.rest.pulls.create({
              title: '[Release] ${{ steps.version_name.outputs.version }}',
              owner,
              repo,
              head: 'staging/release-${{ steps.version_name.outputs.version }}',
              base: 'production',
              body: [
                'This PR is automatically generated to stage a release',
              ].join('\n')
            });
            github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: result.data.number,
              labels: ['release']
            });
