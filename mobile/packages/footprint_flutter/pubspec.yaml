name: footprint_flutter
description: 'A Flutter plugin for Footprint SDK.'
version: 1.0.1
homepage: https://docs.onefootprint.com/sdks/flutter

environment:
  sdk: '>=3.2.5 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  flutter_inappwebview: ^5.8.0
  uni_links: ^0.5.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.footprint.example.footprint_flutter
        pluginClass: FootprintFlutterPlugin
      ios:
        pluginClass: FootprintFlutterPlugin
