name: footprint_flutter
description: 'A Flutter plugin for Footprint SDK.'
version: 1.0.2
homepage: https://docs.onefootprint.com/sdks/flutter

environment:
  sdk: '>=3.2.5 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  flutter_inappwebview: ^5.8.0
  uni_links: ^0.5.1
  http: ^1.2.0
  meta: ^1.12.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11

flutter:
  plugin:
    platforms:
      android:
        package: com.footprint.example.footprint_flutter
        pluginClass: FootprintFlutterPlugin
      ios:
        pluginClass: FootprintFlutterPlugin
