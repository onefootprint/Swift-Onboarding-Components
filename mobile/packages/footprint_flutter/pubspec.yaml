name: footprint_flutter
description: "A Flutter plugin for Footprint SDK."
version: 2.0.0-beta.3.5
homepage: https://docs.onefootprint.com/articles/sdks/flutter

environment:
  sdk: ">=3.2.5 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  flutter_inappwebview: ^6.1.5
  uni_links: ^0.5.1
  http: ^1.2.0
  meta: ^1.12.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  mask_text_input_formatter: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11

flutter:
  plugin:
    platforms:
      android:
        package: com.footprint.example.footprint_flutter
        pluginClass: FootprintFlutterPlugin
      ios:
        pluginClass: FootprintFlutterPlugin
